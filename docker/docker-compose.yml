name: morgan

services:
  morgan-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
      target: production
    container_name: morgan-server
    environment:
      # morgan-server settings (MORGAN_ prefix)
      MORGAN_HOST: 0.0.0.0
      MORGAN_PORT: 8080
      MORGAN_WORKERS: ${MORGAN_WORKERS:-4}
      MORGAN_LOG_LEVEL: ${MORGAN_LOG_LEVEL:-INFO}
      MORGAN_LOG_FORMAT: ${MORGAN_LOG_FORMAT:-json}
      MORGAN_VECTOR_DB_URL: http://qdrant:6333
      MORGAN_REDIS_URL: redis://redis:6379/0
      MORGAN_CACHE_BACKEND: ${MORGAN_CACHE_BACKEND:-redis}
      MORGAN_SESSION_BACKEND: ${MORGAN_SESSION_BACKEND:-redis}
      MORGAN_SESSION_TTL: ${MORGAN_SESSION_TTL:-3600}
      MORGAN_ENABLE_WORKSPACE: ${MORGAN_ENABLE_WORKSPACE:-true}
      MORGAN_ENABLE_TOOLS: ${MORGAN_ENABLE_TOOLS:-true}
      MORGAN_ENABLE_COMPACTION: ${MORGAN_ENABLE_COMPACTION:-true}
      MORGAN_ENABLE_AGENTS: ${MORGAN_ENABLE_AGENTS:-true}
      MORGAN_ENABLE_SCHEDULING: ${MORGAN_ENABLE_SCHEDULING:-true}
      MORGAN_ENABLE_CHANNELS: ${MORGAN_ENABLE_CHANNELS:-false}
      MORGAN_TELEGRAM_TOKEN: ${MORGAN_TELEGRAM_TOKEN:-}
      MORGAN_DISCORD_TOKEN: ${MORGAN_DISCORD_TOKEN:-}
      MORGAN_SYNOLOGY_TOKEN: ${MORGAN_SYNOLOGY_TOKEN:-}
      MORGAN_SYNOLOGY_INCOMING_URL: ${MORGAN_SYNOLOGY_INCOMING_URL:-}
      MORGAN_WORKSPACE_PATH: /home/morgan/.morgan
      MORGAN_LLM_PROVIDER: ${MORGAN_LLM_PROVIDER:-ollama}
      MORGAN_LLM_ENDPOINT: ${MORGAN_LLM_ENDPOINT:-http://192.168.100.233:11434}
      MORGAN_LLM_MODEL: ${MORGAN_LLM_MODEL:-qwen3.5:35b}
      MORGAN_LLM_API_KEY: ${MORGAN_LLM_API_KEY:-ollama-key}
      MORGAN_EMBEDDING_PROVIDER: ${MORGAN_EMBEDDING_PROVIDER:-ollama}
      MORGAN_EMBEDDING_MODEL: ${MORGAN_EMBEDDING_MODEL:-qwen3-embedding:latest}
      MORGAN_EMBEDDING_ENDPOINT: ${MORGAN_EMBEDDING_ENDPOINT:-http://192.168.100.222:11434/v1}
      MORGAN_EMBEDDING_DIMENSIONS: ${MORGAN_EMBEDDING_DIMENSIONS:-2048}

      # morgan-rag core settings (no MORGAN_ prefix)
      LLM_BASE_URL: ${LLM_BASE_URL:-http://192.168.100.233:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen3.5:35b}
      LLM_API_KEY: ${LLM_API_KEY:-ollama-key}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-8192}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://192.168.100.222:11434/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-qwen3-embedding:latest}
      EMBEDDING_FORCE_REMOTE: ${EMBEDDING_FORCE_REMOTE:-true}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://192.168.100.222:11434}
      QDRANT_URL: http://qdrant:6333

      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${MORGAN_SERVER_PORT:-8080}:8080"
    volumes:
      - morgan-data:/app/data
      - morgan-cache:/app/data/cache
      - morgan-models:/app/models
      - morgan-workspace:/home/morgan/.morgan
      - ./config:/app/config:ro
    networks:
      - morgan-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  morgan-cli:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cli
    container_name: morgan-cli
    profiles:
      - cli
    depends_on:
      morgan-server:
        condition: service_healthy
    environment:
      MORGAN_SERVER_URL: http://morgan-server:8080
      MORGAN_USER_ID: ${MORGAN_USER_ID:-docker-user}
    stdin_open: true
    tty: true
    volumes:
      - morgan-cli-home:/home/morgan
    networks:
      - morgan-network
    command: ["--help"]

  redis:
    image: redis:7-alpine
    container_name: morgan-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - morgan-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: morgan-qdrant
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
      - qdrant-snapshots:/qdrant/snapshots
    networks:
      - morgan-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  prometheus:
    image: prom/prometheus:latest
    container_name: morgan-prometheus
    profiles:
      - monitoring
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - morgan-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: morgan-grafana
    profiles:
      - monitoring
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - morgan-network
    restart: unless-stopped

volumes:
  morgan-data:
  morgan-cache:
  morgan-models:
  morgan-workspace:
  morgan-cli-home:
  redis-data:
  qdrant-storage:
  qdrant-snapshots:
  prometheus-data:
  grafana-data:

networks:
  morgan-network:
    driver: bridge
